name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build darwin-amd64
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.value }}
      release_tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "value=${VERSION}"        >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}"         >> "$GITHUB_OUTPUT"
            echo "prerelease=false"        >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="dev-${SHORT_SHA}"
            echo "value=${VERSION}"        >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}"         >> "$GITHUB_OUTPUT"
            echo "prerelease=true"         >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        shell: bash
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          OUT_DIR="dist/darwin_amd64"
          mkdir -p "$OUT_DIR"
          VERSION="${{ steps.version.outputs.value }}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$OUT_DIR/niveniad"   ./cmd/niveniad
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$OUT_DIR/niveniactl" ./cmd/niveniactl
          cp configs/policy.json                      "$OUT_DIR/policy.json"
          cp launchd/com.nivenia.restore.plist        "$OUT_DIR/com.nivenia.restore.plist"
          cp launchd/com.nivenia.updater.plist        "$OUT_DIR/com.nivenia.updater.plist"
          cp scripts/setup.sh                         "$OUT_DIR/setup.sh"
          cp scripts/update.sh                        "$OUT_DIR/update.sh"
          cp scripts/nivenia_recovery.sh              "$OUT_DIR/nivenia_recovery.sh"
          cp scripts/prepare_clean_capture.sh         "$OUT_DIR/prepare_clean_capture.sh"

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          SRC_DIR="dist/darwin_amd64"
          ARCHIVE="dist/nivenia_${VERSION}_darwin_amd64.tar.gz"
          tar -C "$SRC_DIR" -czf "$ARCHIVE" .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nivenia-darwin-amd64
          path: dist/nivenia_*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:            ${{ needs.build-binaries.outputs.release_tag }}
          target_commitish:    ${{ github.sha }}
          name:                Nivenia ${{ needs.build-binaries.outputs.release_version }}
          prerelease:          ${{ needs.build-binaries.outputs.is_prerelease }}
          generate_release_notes: true
          files:               artifacts/**/*.tar.gz
