name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build darwin-amd64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Compute version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build binaries
        shell: bash
        env:
          GOOS: darwin
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          set -euo pipefail
          OUT_DIR="dist/darwin_amd64"
          mkdir -p "$OUT_DIR"
          go build -trimpath -ldflags "-s -w" -o "$OUT_DIR/niveniad" ./cmd/niveniad
          go build -trimpath -ldflags "-s -w" -o "$OUT_DIR/niveniactl" ./cmd/niveniactl
          cp configs/policy.json "$OUT_DIR/policy.json"
          cp launchd/com.nivenia.restore.plist "$OUT_DIR/com.nivenia.restore.plist"
          cp launchd/com.nivenia.updater.plist "$OUT_DIR/com.nivenia.updater.plist"
          cp scripts/setup.sh "$OUT_DIR/setup.sh"
          cp scripts/update.sh "$OUT_DIR/update.sh"

      - name: Create archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.value }}"
          SRC_DIR="dist/darwin_amd64"
          ARCHIVE="dist/nivenia_${VERSION}_darwin_amd64.tar.gz"
          tar -C "$SRC_DIR" -czf "$ARCHIVE" .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nivenia-darwin-amd64
          path: dist/nivenia_*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    needs:
      - build-binaries
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
